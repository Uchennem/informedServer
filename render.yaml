services:
  - type: web
    name: informed-api
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run start:api
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGODB_URI
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        sync: false
